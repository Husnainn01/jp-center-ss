version: "3.8"

x-s3-env: &s3-env
  S3_ENDPOINT: ${S3_ENDPOINT:-https://dffe00b2c327c69b4a869d74b4e7a2a2.r2.cloudflarestorage.com}
  S3_BUCKET: ${S3_BUCKET:-jpcenter}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}

services:
  postgres:
    image: postgres:16-alpine
    container_name: jp-auction-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jp_auction
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jp_auction
      FRONTEND_URL: http://localhost:3000
      CRM_API_URL: https://ssh-crm-production.up.railway.app
      <<: *s3-env
    depends_on:
      - postgres
    restart: unless-stopped

  scraper-aucnet:
    build: ./scraper
    command: python run_aucnet.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jp_auction
      AUCNET_INTERVAL_MINUTES: 30
      HEADLESS: "true"
      <<: *s3-env
    depends_on:
      - postgres
    restart: unless-stopped

  scraper-ninja-jp-popular:
    build: ./scraper
    command: python run_ninja_jp_popular.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jp_auction
      NINJA_INTERVAL_MINUTES: 30
      HEADLESS: "true"
      <<: *s3-env
    depends_on:
      - postgres
    restart: unless-stopped

  scraper-ninja-jp-other:
    build: ./scraper
    command: python run_ninja_jp_other.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jp_auction
      NINJA_INTERVAL_MINUTES: 30
      HEADLESS: "true"
      <<: *s3-env
    depends_on:
      - postgres
    restart: unless-stopped

  scraper-ninja-imported:
    build: ./scraper
    command: python run_ninja_imported.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jp_auction
      NINJA_INTERVAL_MINUTES: 30
      HEADLESS: "true"
      <<: *s3-env
    depends_on:
      - postgres
    restart: unless-stopped

  scraper-taa:
    build: ./scraper
    command: python run_taa.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jp_auction
      TAA_INTERVAL_MINUTES: 30
      HEADLESS: "true"
      <<: *s3-env
    depends_on:
      - postgres
    restart: unless-stopped

  scraper-iauc:
    build: ./scraper
    command: python run_iauc.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jp_auction
      IAUC_INTERVAL_MINUTES: 30
      HEADLESS: "true"
      <<: *s3-env
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
